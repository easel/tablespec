      - coverage_type
      description_keywords:
      - line of business
      - lob
      - plan type
      - coverage type
      sample_value_pattern: ^(MEDICAID|MEDICARE|MARKETPLACE|DUALS|MD|ME|MP)$
    sample_generation:
      method: generate_lob
    validations:
    - type: expect_column_values_to_be_in_set
      kwargs:
        value_set:
        - MEDICAID
        - MEDICARE
        - MARKETPLACE
        - DUALS
        - MD
        - ME
        - MP
      severity: critical
